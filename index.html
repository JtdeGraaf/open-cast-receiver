<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Open Cast Receiver</title>

  <!-- Google Cast Receiver Framework -->
  <script src="//www.gstatic.com/cast/sdk/libs/caf_receiver/v3/cast_receiver_framework.js"></script>

  <!-- Shaka Player for broad codec support -->
  <script src="//cdn.jsdelivr.net/npm/shaka-player@4.7.11/dist/shaka-player.compiled.min.js"></script>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #000;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      overflow: hidden;
      width: 100vw;
      height: 100vh;
    }

    #player {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
    }

    video {
      width: 100%;
      height: 100%;
      background: #000;
    }

    #splash {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      z-index: 10;
      transition: opacity 0.5s ease;
    }

    #splash.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .logo {
      width: 120px;
      height: 120px;
      margin-bottom: 24px;
      animation: pulse 2s ease-in-out infinite;
    }

    .logo svg {
      width: 100%;
      height: 100%;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.05); opacity: 0.8; }
    }

    .title {
      font-size: 28px;
      font-weight: 600;
      margin-bottom: 8px;
    }

    .subtitle {
      font-size: 16px;
      opacity: 0.7;
    }

    .status {
      margin-top: 24px;
      font-size: 14px;
      opacity: 0.5;
    }

    #error {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(255, 0, 0, 0.2);
      border: 1px solid rgba(255, 0, 0, 0.5);
      padding: 20px 40px;
      border-radius: 8px;
      display: none;
      z-index: 20;
    }
  </style>
</head>
<body>
  <div id="player">
    <video id="video"></video>
  </div>

  <div id="splash">
    <div class="logo">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <rect x="2" y="7" width="20" height="15" rx="2" ry="2"/>
        <polyline points="17 2 12 7 7 2"/>
      </svg>
    </div>
    <div class="title">Open Cast Receiver</div>
    <div class="subtitle">Ready to receive</div>
    <div class="status">Waiting for media...</div>
  </div>

  <div id="error"></div>

  <script>
    (function() {
      'use strict';

      const LOG_PREFIX = '[OpenCastReceiver]';
      const video = document.getElementById('video');
      const splash = document.getElementById('splash');
      const errorDiv = document.getElementById('error');

      let shakaPlayer = null;
      let errorTimeout = null;
      let usingShakaForPlayback = false;

      // Initialize Shaka Player
      function initShaka() {
        shaka.polyfill.installAll();

        if (!shaka.Player.isBrowserSupported()) {
          console.error(LOG_PREFIX, 'Shaka Player not supported');
          return false;
        }

        shakaPlayer = new shaka.Player(video);

        shakaPlayer.addEventListener('error', (event) => {
          console.error(LOG_PREFIX, 'Shaka error:', event.detail);
          showError('Playback error: ' + event.detail.message);
        });

        // Configure for broad codec support
        shakaPlayer.configure({
          streaming: {
            bufferingGoal: 30,
            rebufferingGoal: 2,
            bufferBehind: 30,
            retryParameters: {
              maxAttempts: 5,
              baseDelay: 1000,
              backoffFactor: 2,
              timeout: 30000
            }
          },
          manifest: {
            retryParameters: {
              maxAttempts: 5,
              baseDelay: 1000,
              backoffFactor: 2,
              timeout: 30000
            }
          }
        });

        console.log(LOG_PREFIX, 'Shaka Player initialized');
        return true;
      }

      function showError(message) {
        errorDiv.textContent = message;
        errorDiv.style.display = 'block';
        // Clear any existing timeout
        if (errorTimeout) {
          clearTimeout(errorTimeout);
        }
        // Keep error visible for 15 seconds
        errorTimeout = setTimeout(() => {
          errorDiv.style.display = 'none';
        }, 15000);
      }

      function hideError() {
        if (errorTimeout) {
          clearTimeout(errorTimeout);
          errorTimeout = null;
        }
        errorDiv.style.display = 'none';
      }

      function hideSplash() {
        splash.classList.add('hidden');
      }

      function showSplash() {
        splash.classList.remove('hidden');
      }

      // Initialize Cast Receiver
      const context = cast.framework.CastReceiverContext.getInstance();
      const playerManager = context.getPlayerManager();

      // Handle LOAD requests
      playerManager.setMessageInterceptor(
        cast.framework.messages.MessageType.LOAD,
        async (loadRequestData) => {
          try {
            console.log(LOG_PREFIX, 'Load request:', loadRequestData);

            // Clear any previous errors on new load
            hideError();

            const mediaInfo = loadRequestData.media;
            if (!mediaInfo) {
              console.error(LOG_PREFIX, 'No media info in load request');
              showError('No media info in load request');
              return loadRequestData;
            }

            const url = mediaInfo.contentUrl || mediaInfo.contentId;
            if (!url) {
              console.error(LOG_PREFIX, 'No URL in load request');
              showError('No URL in load request');
              return loadRequestData;
            }

            const contentType = mediaInfo.contentType || '';

            console.log(LOG_PREFIX, 'Loading URL:', url);
            console.log(LOG_PREFIX, 'Content type:', contentType);

            // For HLS/DASH streams, use Shaka Player (case-insensitive detection)
            const urlLower = url.toLowerCase();
            const isAdaptiveStream =
              urlLower.includes('.m3u8') ||
              urlLower.includes('.mpd') ||
              contentType.toLowerCase().includes('mpegurl') ||
              contentType.toLowerCase().includes('dash');

            if (isAdaptiveStream || contentType.includes('matroska') || urlLower.includes('.mkv')) {
              try {
                // Unload previous stream before loading new content
                await shakaPlayer.unload();

                // Use Shaka for adaptive streams
                await shakaPlayer.load(url);
                console.log(LOG_PREFIX, 'Shaka loaded successfully');

                hideSplash();
                usingShakaForPlayback = true;

                // Sync media information with Cast framework
                const mediaStatus = playerManager.getMediaInformation() || {};
                mediaStatus.contentId = url;
                mediaStatus.contentUrl = url;
                mediaStatus.duration = video.duration || 0;
                playerManager.setMediaInformation(mediaStatus);

                // Start playback
                if (loadRequestData.autoplay !== false) {
                  // Handle autoplay rejection
                  try {
                    await video.play();
                  } catch (playError) {
                    console.warn(LOG_PREFIX, 'Autoplay blocked:', playError);
                  }
                }

                // Wait for metadata before seeking
                if (loadRequestData.currentTime) {
                  if (video.readyState >= 1) {
                    video.currentTime = loadRequestData.currentTime;
                  } else {
                    video.addEventListener('loadedmetadata', function seekOnce() {
                      video.currentTime = loadRequestData.currentTime;
                      video.removeEventListener('loadedmetadata', seekOnce);
                    });
                  }
                }

                // Return null to prevent default player from loading
                return null;
              } catch (error) {
                console.error(LOG_PREFIX, 'Shaka load error:', error);
                showError('Stream load failed: ' + error.message);
                // Fall back to default player
                return loadRequestData;
              }
            }

            // For standard formats, use default Cast player
            usingShakaForPlayback = false;
            hideSplash();
            return loadRequestData;
          } catch (error) {
            console.error(LOG_PREFIX, 'Load interceptor error:', error);
            showError('Load error: ' + error.message);
            return loadRequestData;
          }
        }
      );

      // Handle playback events
      playerManager.addEventListener(
        cast.framework.events.EventType.PLAYER_LOAD_COMPLETE,
        () => {
          console.log(LOG_PREFIX, 'Player load complete');
          hideSplash();
        }
      );

      playerManager.addEventListener(
        cast.framework.events.EventType.MEDIA_FINISHED,
        () => {
          console.log(LOG_PREFIX, 'Media finished');
          showSplash();
        }
      );

      playerManager.addEventListener(
        cast.framework.events.EventType.ERROR,
        (event) => {
          console.error(LOG_PREFIX, 'Player error:', event);
        }
      );

      // Sync Shaka player state with Cast framework
      video.addEventListener('play', () => {
        console.log(LOG_PREFIX, 'Video playing');
        if (usingShakaForPlayback) {
          playerManager.broadcastStatus(true);
        }
      });

      video.addEventListener('pause', () => {
        console.log(LOG_PREFIX, 'Video paused');
        if (usingShakaForPlayback) {
          playerManager.broadcastStatus(true);
        }
      });

      video.addEventListener('timeupdate', () => {
        if (usingShakaForPlayback) {
          // Periodically sync playback position (throttled by browser)
          playerManager.broadcastStatus(false);
        }
      });

      video.addEventListener('durationchange', () => {
        if (usingShakaForPlayback && video.duration) {
          const mediaInfo = playerManager.getMediaInformation();
          if (mediaInfo) {
            mediaInfo.duration = video.duration;
            playerManager.setMediaInformation(mediaInfo);
          }
        }
      });

      video.addEventListener('ended', () => {
        console.log(LOG_PREFIX, 'Video ended');
        if (usingShakaForPlayback) {
          playerManager.broadcastStatus(true);
        }
        showSplash();
      });

      // Initialize
      if (initShaka()) {
        const options = new cast.framework.CastReceiverOptions();
        options.disableIdleTimeout = true;

        console.log(LOG_PREFIX, 'Starting Cast receiver...');
        context.start(options);
        console.log(LOG_PREFIX, 'Cast receiver started');
      } else {
        showError('Failed to initialize player');
      }
    })();
  </script>
</body>
</html>
